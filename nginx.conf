# HTTP сервер
server {
    listen 80;
    server_name ruesvertes.ru www.ruesvertes.ru;
    
    # ACME challenge для Let's Encrypt (должен быть ПЕРВЫМ!)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    # Редирект на HTTPS (будет автоматически включен после получения сертификатов)
    # Временно отключен для получения сертификатов через certbot
    # После получения сертификатов certbot автоматически включит редирект
    # Или раскомментируйте следующую строку вручную:
    # return 301 https://$server_name$request_uri;
    
    # Временная конфигурация для получения сертификатов
    # Certbot автоматически добавит редирект после получения сертификатов
    location / {
        proxy_pass http://localhost:3300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# HTTPS сервер
server {
    listen 443 ssl http2;
    server_name ruesvertes.ru www.ruesvertes.ru;
    
    # SSL сертификаты Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/ruesvertes.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ruesvertes.ru/privkey.pem;
    
    # SSL настройки
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Безопасность заголовков
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Логи
    access_log /var/log/nginx/ruesvertes.ru.access.log;
    error_log /var/log/nginx/ruesvertes.ru.error.log;
    
    # Максимальный размер загружаемого файла
    client_max_body_size 20M;
    
    location / {
        proxy_pass http://localhost:3300;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Кеширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3300;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

