name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
    
      
      - name: Setup SSH
        env:
          VPS_HOST: 92.118.114.147
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS
        env:
          VPS_HOST: 92.118.114.147
          VPS_USER: 'root'
          VPS_PORT: '22'
          DEPLOY_PATH: '/var/www/reusvertus' 
          GIT_REPO: 'https://github.com/Fluttrium/ReusVertus.git' 
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST bash -s << 'ENDSSH'
            set -e
            
            # Захардкоженные значения
            DEPLOY_PATH="/var/www/reusvertus"
            GIT_REPO="https://github.com/Fluttrium/ReusVertus.git"
            
            # Создаем директорию, если её нет
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"
            
            echo "DEPLOY_PATH: $DEPLOY_PATH"
            echo "GIT_REPO: $GIT_REPO"
            echo "Используем публичный репозиторий (без токена)"
            
            # Для публичного репозитория используем прямой URL
            GIT_URL="$GIT_REPO"
            
            # Отключаем интерактивные запросы
            export GIT_TERMINAL_PROMPT=0
            export GIT_ASKPASS=echo
            
            # Инициализируем или обновляем git репозиторий
            if [ ! -d .git ]; then
              echo "Инициализируем git репозиторий..."
              rm -rf * .* 2>/dev/null || true
              git clone "$GIT_REPO" -b main .
            else
              echo "Обновляем код из репозитория..."
              
              # Удаляем все lock файлы git
              find .git -name "*.lock" -type f -delete 2>/dev/null || true
              rm -f .git/config.lock .git/index.lock .git/HEAD.lock 2>/dev/null || true
              
              # Пробуем обновить remote, если не получается - пересоздаем репозиторий
              UPDATE_FAILED=false
              
              # Пробуем обновить remote URL
              for i in 1 2 3; do
                rm -f .git/config.lock 2>/dev/null || true
                sleep 0.5
                if git remote get-url origin >/dev/null 2>&1; then
                  if git remote set-url origin "$GIT_REPO" 2>/dev/null; then
                    UPDATE_FAILED=false
                    break
                  fi
                else
                  if git remote add origin "$GIT_REPO" 2>/dev/null; then
                    UPDATE_FAILED=false
                    break
                  fi
                fi
                UPDATE_FAILED=true
              done
              
              # Если не удалось обновить, пересоздаем репозиторий
              if [ "$UPDATE_FAILED" = true ] || ! git remote get-url origin >/dev/null 2>&1; then
                echo "Не удалось обновить remote, пересоздаем репозиторий..."
                cd "$DEPLOY_PATH/.."
                rm -rf "$DEPLOY_PATH"
                mkdir -p "$DEPLOY_PATH"
                cd "$DEPLOY_PATH"
                git clone "$GIT_REPO" -b main .
              else
                # Настраиваем git локально
                rm -f .git/config.lock 2>/dev/null || true
                git config user.email "deploy@github-actions" || true
                git config user.name "GitHub Actions" || true
                
                # Fetch и обновление ветки main
                git fetch origin main
                git checkout main 2>/dev/null || git checkout -b main origin/main
                git reset --hard origin/main
                git clean -fd
              fi
            fi
            
            # Проверяем наличие Docker Compose
            if command -v docker-compose &> /dev/null; then
              DOCKER_COMPOSE_CMD="docker-compose"
            elif docker compose version &> /dev/null; then
              DOCKER_COMPOSE_CMD="docker compose"
            else
              echo "Ошибка: Docker Compose не установлен"
              echo "Устанавливаем Docker Compose..."
              sudo apt-get update -qq
              sudo apt-get install -y docker-compose-plugin || sudo apt-get install -y docker-compose
              if command -v docker-compose &> /dev/null; then
                DOCKER_COMPOSE_CMD="docker-compose"
              else
                DOCKER_COMPOSE_CMD="docker compose"
              fi
            fi
            
            echo "Используем команду: $DOCKER_COMPOSE_CMD"
            
            # Запускаем docker compose
            $DOCKER_COMPOSE_CMD down || true
            $DOCKER_COMPOSE_CMD pull || true
            $DOCKER_COMPOSE_CMD up -d --build
            
            # Проверяем статус
            $DOCKER_COMPOSE_CMD ps
          ENDSSH
      
      - name: Setup Nginx
        env:
          VPS_HOST: 92.118.114.147
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH || '/var/www/reusvertus' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'ENDSSH'
            # Копируем конфигурацию nginx из репозитория
            if [ -f $DEPLOY_PATH/nginx.conf ]; then
              sudo cp $DEPLOY_PATH/nginx.conf /etc/nginx/sites-available/ruesvertes.ru
            fi
            
            # Создаем симлинк, если его нет
            sudo ln -sf /etc/nginx/sites-available/ruesvertes.ru /etc/nginx/sites-enabled/
            
            # Проверяем конфигурацию nginx
            sudo nginx -t
            
            # Перезагружаем nginx
            sudo systemctl reload nginx || sudo service nginx reload
          ENDSSH
      
      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key

