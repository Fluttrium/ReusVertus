name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        env:
          VPS_HOST: 92.118.114.147
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS
        env:
          VPS_HOST: 92.118.114.147
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://gen_user:std%21Y8XUk-RF%3BV@185.211.170.182:5432/default_db?schema=reusvertus' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST bash -s << 'ENDSSH'
            mkdir -p /var/www/reusvertus
            cd /var/www/reusvertus
            
            export GIT_TERMINAL_PROMPT=0
            git config --global user.email "deploy@github-actions"
            git config --global user.name "GitHub Actions"
            
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/Fluttrium/ReusVertus.git
              git fetch origin
              if git ls-remote --heads origin main 2>/dev/null | grep -q main; then
                git checkout -b main origin/main
              elif git ls-remote --heads origin master 2>/dev/null | grep -q master; then
                git checkout -b master origin/master
              else
                exit 1
              fi
            else
              git remote remove origin 2>/dev/null || true
              git remote add origin https://github.com/Fluttrium/ReusVertus.git
              git fetch origin
              if git ls-remote --heads origin main 2>/dev/null | grep -q main; then
                git reset --hard origin/main
              elif git ls-remote --heads origin master 2>/dev/null | grep -q master; then
                git reset --hard origin/master
              else
                exit 1
              fi
              git clean -fd
            fi
            
            if command -v docker-compose &> /dev/null; then
              DOCKER_COMPOSE_CMD="docker-compose"
            elif docker compose version &> /dev/null; then
              DOCKER_COMPOSE_CMD="docker compose"
            else
              sudo apt-get update -qq
              sudo apt-get install -y docker-compose-plugin || sudo apt-get install -y docker-compose
              if command -v docker-compose &> /dev/null; then
                DOCKER_COMPOSE_CMD="docker-compose"
              else
                DOCKER_COMPOSE_CMD="docker compose"
              fi
            fi
            
            if [ ! -f .env ]; then
              touch .env
            fi
            
            # Устанавливаем DATABASE_URL - используем значение по умолчанию (захардкожено)
            DATABASE_URL="postgresql://gen_user:std%21Y8XUk-RF%3BV@185.211.170.182:5432/default_db?schema=reusvertus"
            export DATABASE_URL
            
            # Удаляем старую строку DATABASE_URL если она есть (любую, с кавычками или без)
            sed -i.bak '/^DATABASE_URL=/d' .env 2>/dev/null || grep -v "^DATABASE_URL" .env > .env.tmp && mv .env.tmp .env 2>/dev/null || true
            # Добавляем новую строку DATABASE_URL без кавычек
            echo "DATABASE_URL=\$DATABASE_URL" >> .env
            
            # Проверяем, что DATABASE_URL записан в .env и начинается с postgresql://
            if ! grep -q "^DATABASE_URL=" .env; then
              echo "ERROR: Failed to write DATABASE_URL to .env file!" >&2
              exit 1
            fi
            
            # Проверяем содержимое .env файла (первые 50 символов для безопасности)
            ENV_VALUE=\$(grep "^DATABASE_URL=" .env | cut -d'=' -f2- | head -c 50)
            if ! echo "\$ENV_VALUE" | grep -q "^postgresql://"; then
              echo "ERROR: DATABASE_URL in .env file is invalid!" >&2
              echo "First 50 chars: [\$ENV_VALUE]" >&2
              echo "Full line: [\$(grep '^DATABASE_URL=' .env)]" >&2
              exit 1
            fi
            
            echo "DATABASE_URL is set correctly in .env file"
            
            # Показываем первые 50 символов для проверки (безопасно)
            echo "DATABASE_URL starts with: \$(grep '^DATABASE_URL=' .env | cut -d'=' -f2- | head -c 50)"
            
            # Убеждаемся, что DATABASE_URL экспортирован в окружение для docker-compose
            export DATABASE_URL
            
            $DOCKER_COMPOSE_CMD down || true
            $DOCKER_COMPOSE_CMD pull || true
            $DOCKER_COMPOSE_CMD up -d --build
            
            sleep 5
            $DOCKER_COMPOSE_CMD logs --tail=50 app || true
          ENDSSH
      
      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
