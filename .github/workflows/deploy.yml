name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        env:
          VPS_HOST: 92.118.114.147
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS
        env:
          VPS_HOST: 92.118.114.147
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://gen_user:std%21Y8XUk-RF%3BV@185.211.170.182:5432/default_db?schema=reusvertus' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST bash -s << 'ENDSSH'
            set -e
            
            # Создаем директорию проекта
            mkdir -p /var/www/reusvertus
            cd /var/www/reusvertus || exit 1
            
            # Настраиваем Git
            export GIT_TERMINAL_PROMPT=0
            git config --global user.email "deploy@github-actions" || true
            git config --global user.name "GitHub Actions" || true
            
            # Клонируем или обновляем репозиторий
            if [ ! -d .git ]; then
              echo "Инициализация нового репозитория..."
              rm -rf /var/www/reusvertus/* /var/www/reusvertus/.* 2>/dev/null || true
              git clone https://github.com/Fluttrium/ReusVertus.git /tmp/reusvertus-tmp || exit 1
              mv /tmp/reusvertus-tmp/* /tmp/reusvertus-tmp/.* /var/www/reusvertus/ 2>/dev/null || true
              rm -rf /tmp/reusvertus-tmp
              cd /var/www/reusvertus
            else
              echo "Обновление существующего репозитория..."
              git remote remove origin 2>/dev/null || true
              git remote add origin https://github.com/Fluttrium/ReusVertus.git 2>/dev/null || true
              git fetch origin || exit 1
              if git ls-remote --heads origin main 2>/dev/null | grep -q main; then
                git checkout main 2>/dev/null || git checkout -b main origin/main
                git reset --hard origin/main || exit 1
              elif git ls-remote --heads origin master 2>/dev/null | grep -q master; then
                git checkout master 2>/dev/null || git checkout -b master origin/master
                git reset --hard origin/master || exit 1
              else
                echo "ERROR: Не найдена ветка main или master" >&2
                exit 1
              fi
              git clean -fd || true
            fi
            
            # Устанавливаем Docker Compose
            echo "Проверка Docker Compose..."
            if docker compose version &> /dev/null 2>&1; then
              DOCKER_COMPOSE_CMD="docker compose"
              echo "Используется: docker compose"
            elif command -v docker-compose &> /dev/null; then
              DOCKER_COMPOSE_CMD="docker-compose"
              echo "Используется: docker-compose"
            else
              echo "Установка Docker Compose..."
              sudo apt-get update -qq
              # Пробуем установить docker-compose-plugin (новый способ)
              if sudo apt-get install -y docker-compose-plugin 2>/dev/null; then
                DOCKER_COMPOSE_CMD="docker compose"
                echo "Установлен: docker compose (plugin)"
              # Пробуем установить старый docker-compose
              elif sudo apt-get install -y docker-compose 2>/dev/null; then
                DOCKER_COMPOSE_CMD="docker-compose"
                echo "Установлен: docker-compose (standalone)"
              else
                echo "ERROR: Не удалось установить Docker Compose" >&2
                exit 1
              fi
            fi
            
            # Проверяем, что команда работает
            $DOCKER_COMPOSE_CMD version || (echo "ERROR: Docker Compose не работает" >&2 && exit 1)
            
            # Настраиваем .env файл
            if [ ! -f .env ]; then
              touch .env
            fi
            
            # Устанавливаем DATABASE_URL
            DATABASE_URL="postgresql://gen_user:std%21Y8XUk-RF%3BV@185.211.170.182:5432/default_db?schema=reusvertus"
            export DATABASE_URL
            
            # Удаляем старую строку DATABASE_URL если она есть
            sed -i.bak '/^DATABASE_URL=/d' .env 2>/dev/null || grep -v "^DATABASE_URL" .env > .env.tmp && mv .env.tmp .env 2>/dev/null || true
            # Добавляем новую строку DATABASE_URL
            echo "DATABASE_URL=postgresql://gen_user:std%21Y8XUk-RF%3BV@185.211.170.182:5432/default_db?schema=reusvertus" >> .env
            
            # Проверяем, что DATABASE_URL записан в .env
            if ! grep -q "^DATABASE_URL=" .env; then
              echo "ERROR: Failed to write DATABASE_URL to .env file!" >&2
              exit 1
            fi
            
            # Проверяем содержимое .env файла
            DB_CHECK=$(grep "^DATABASE_URL=" .env | cut -d'=' -f2- | head -c 20)
            if ! echo "$DB_CHECK" | grep -q "postgresql://"; then
              echo "ERROR: DATABASE_URL in .env file is invalid!" >&2
              echo "First 20 chars of DATABASE_URL: $DB_CHECK" >&2
              exit 1
            fi
            
            echo "DATABASE_URL is set correctly in .env file"
            
            # Настраиваем Nginx
            echo "Настройка Nginx..."
            if ! command -v nginx &> /dev/null; then
              echo "Установка Nginx..."
              sudo apt-get update -qq
              sudo apt-get install -y nginx || (echo "ERROR: Не удалось установить nginx" >&2 && exit 1)
            fi
            
            # Устанавливаем certbot для SSL сертификатов
            if ! command -v certbot &> /dev/null; then
              echo "Установка Certbot..."
              sudo apt-get update -qq
              sudo apt-get install -y certbot python3-certbot-nginx || echo "Предупреждение: не удалось установить certbot" >&2
            fi
            
            if [ -f nginx.conf ]; then
              # Проверяем наличие SSL сертификатов
              SSL_CERTS_EXIST=false
              if [ -f /etc/letsencrypt/live/ruesvertes.ru/fullchain.pem ]; then
                SSL_CERTS_EXIST=true
                echo "SSL сертификаты уже установлены"
              else
                echo "SSL сертификаты не найдены. Попытка получения сертификатов..."
                
                # Создаем временную конфигурацию без HTTPS для получения сертификатов
                echo "server {" > /tmp/nginx-temp.conf
                echo "    listen 80;" >> /tmp/nginx-temp.conf
                echo "    server_name ruesvertes.ru www.ruesvertes.ru;" >> /tmp/nginx-temp.conf
                echo "    location /.well-known/acme-challenge/ {" >> /tmp/nginx-temp.conf
                echo "        root /var/www/html;" >> /tmp/nginx-temp.conf
                echo "    }" >> /tmp/nginx-temp.conf
                echo "    location / {" >> /tmp/nginx-temp.conf
                echo "        proxy_pass http://localhost:3300;" >> /tmp/nginx-temp.conf
                echo "        proxy_http_version 1.1;" >> /tmp/nginx-temp.conf
                echo "        proxy_set_header Upgrade \$http_upgrade;" >> /tmp/nginx-temp.conf
                echo "        proxy_set_header Connection 'upgrade';" >> /tmp/nginx-temp.conf
                echo "        proxy_set_header Host \$host;" >> /tmp/nginx-temp.conf
                echo "        proxy_set_header X-Real-IP \$remote_addr;" >> /tmp/nginx-temp.conf
                echo "        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;" >> /tmp/nginx-temp.conf
                echo "        proxy_set_header X-Forwarded-Proto \$scheme;" >> /tmp/nginx-temp.conf
                echo "        proxy_cache_bypass \$http_upgrade;" >> /tmp/nginx-temp.conf
                echo "    }" >> /tmp/nginx-temp.conf
                echo "}" >> /tmp/nginx-temp.conf
                
                sudo cp /tmp/nginx-temp.conf /etc/nginx/sites-available/reusvertus.conf
                sudo ln -sf /etc/nginx/sites-available/reusvertus.conf /etc/nginx/sites-enabled/reusvertus.conf
                sudo rm -f /etc/nginx/sites-enabled/default
                sudo mkdir -p /var/www/html
                sudo chown -R www-data:www-data /var/www/html || true
                
                if sudo nginx -t; then
                  sudo systemctl restart nginx || echo "Предупреждение: не удалось перезапустить nginx" >&2
                  
                  # Пробуем получить сертификаты через webroot (более надежный метод)
                  if sudo certbot certonly --webroot -w /var/www/html -d ruesvertes.ru -d www.ruesvertes.ru --non-interactive --agree-tos --email admin@ruesvertes.ru 2>&1; then
                    echo "SSL сертификаты получены успешно через webroot"
                    SSL_CERTS_EXIST=true
                  elif sudo certbot certonly --nginx -d ruesvertes.ru -d www.ruesvertes.ru --non-interactive --agree-tos --email admin@ruesvertes.ru 2>&1; then
                    echo "SSL сертификаты получены успешно через nginx"
                    SSL_CERTS_EXIST=true
                  else
                    echo "Предупреждение: не удалось получить SSL сертификаты автоматически" >&2
                    echo "Убедитесь, что домены ruesvertes.ru и www.ruesvertes.ru указывают на этот сервер" >&2
                    echo "Попробуйте получить сертификаты вручную: sudo certbot --nginx -d ruesvertes.ru -d www.ruesvertes.ru" >&2
                    SSL_CERTS_EXIST=false
                  fi
                else
                  echo "Предупреждение: ошибка в временной конфигурации nginx" >&2
                  SSL_CERTS_EXIST=false
                fi
              fi
              
              # Применяем финальную конфигурацию
              if [ "$SSL_CERTS_EXIST" = true ]; then
                echo "Применяем конфигурацию с HTTPS..."
                sudo cp nginx.conf /etc/nginx/sites-available/reusvertus.conf
              else
                echo "Применяем конфигурацию без HTTPS (сертификаты отсутствуют)..."
                # Создаем конфигурацию без HTTPS блока и без редиректа
                sed '/^# HTTPS сервер$/,/^}$/d' nginx.conf | sed 's/return 301 https:/# return 301 https:/' > /tmp/nginx-no-https.conf
                sudo cp /tmp/nginx-no-https.conf /etc/nginx/sites-available/reusvertus.conf
              fi
              
              sudo ln -sf /etc/nginx/sites-available/reusvertus.conf /etc/nginx/sites-enabled/reusvertus.conf
              sudo rm -f /etc/nginx/sites-enabled/default
              
              # Проверяем конфигурацию nginx
              if sudo nginx -t; then
                sudo systemctl reload nginx || sudo systemctl restart nginx || echo "Предупреждение: не удалось перезагрузить nginx" >&2
                echo "Nginx конфигурация применена успешно"
              else
                echo "ERROR: Ошибка в конфигурации nginx. Проверьте логи." >&2
                sudo nginx -t
                exit 1
              fi
            else
              echo "Предупреждение: nginx.conf не найден" >&2
            fi
            
            # Убеждаемся, что DATABASE_URL экспортирован в окружение для docker-compose
            export DATABASE_URL
            
            # Останавливаем старые контейнеры
            echo "Остановка старых контейнеров..."
            $DOCKER_COMPOSE_CMD down || true
            
            # Собираем и запускаем контейнеры
            echo "Сборка и запуск контейнеров..."
            $DOCKER_COMPOSE_CMD up -d --build || exit 1
            
            sleep 5
            
            # Показываем логи
            echo "Логи приложения:"
            $DOCKER_COMPOSE_CMD logs --tail=50 app || true
            
            # Проверяем статус контейнеров
            echo "Статус контейнеров:"
            $DOCKER_COMPOSE_CMD ps || true
          ENDSSH
      
      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
