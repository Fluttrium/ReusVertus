name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup SSH
        env:
          VPS_HOST: 92.118.114.147
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $VPS_HOST >> ~/.ssh/known_hosts
      
      - name: Deploy to VPS
        env:
          VPS_HOST: 92.118.114.147
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST bash -s << 'ENDSSH'
            mkdir -p /var/www/reusvertus
            cd /var/www/reusvertus
            
            export GIT_TERMINAL_PROMPT=0
            git config --global user.email "deploy@github-actions"
            git config --global user.name "GitHub Actions"
            
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/Fluttrium/ReusVertus.git
              git fetch origin
              if git ls-remote --heads origin main 2>/dev/null | grep -q main; then
                git checkout -b main origin/main
              elif git ls-remote --heads origin master 2>/dev/null | grep -q master; then
                git checkout -b master origin/master
              else
                exit 1
              fi
            else
              git remote remove origin 2>/dev/null || true
              git remote add origin https://github.com/Fluttrium/ReusVertus.git
              git fetch origin
              if git ls-remote --heads origin main 2>/dev/null | grep -q main; then
                git reset --hard origin/main
              elif git ls-remote --heads origin master 2>/dev/null | grep -q master; then
                git reset --hard origin/master
              else
                exit 1
              fi
              git clean -fd
            fi
            
            if command -v docker-compose &> /dev/null; then
              DOCKER_COMPOSE_CMD="docker-compose"
            elif docker compose version &> /dev/null; then
              DOCKER_COMPOSE_CMD="docker compose"
            else
              sudo apt-get update -qq
              sudo apt-get install -y docker-compose-plugin || sudo apt-get install -y docker-compose
              if command -v docker-compose &> /dev/null; then
                DOCKER_COMPOSE_CMD="docker-compose"
              else
                DOCKER_COMPOSE_CMD="docker compose"
              fi
            fi
            
            $DOCKER_COMPOSE_CMD down || true
            $DOCKER_COMPOSE_CMD pull || true
            $DOCKER_COMPOSE_CMD up -d --build
          ENDSSH
      
      - name: Setup SSL Certificate
        env:
          VPS_HOST: 92.118.114.147
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DOMAIN: ${{ secrets.DOMAIN || 'ruesvertes.ru' }}
          EMAIL: ${{ secrets.EMAIL }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'ENDSSH'
            if [ ! -f /etc/letsencrypt/live/$DOMAIN/fullchain.pem ]; then
              if ! command -v certbot &> /dev/null; then
                sudo apt-get update -qq
                sudo apt-get install -y certbot python3-certbot-nginx
              fi
              
              sudo tee /etc/nginx/sites-available/ruesvertes.ru > /dev/null << 'NGINXCONF'
            server {
                listen 80;
                server_name ruesvertes.ru www.ruesvertes.ru;
                location / {
                    proxy_pass http://localhost:3300;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            NGINXCONF
              sudo ln -sf /etc/nginx/sites-available/ruesvertes.ru /etc/nginx/sites-enabled/
              sudo rm -f /etc/nginx/sites-enabled/default
              sudo nginx -t && sudo systemctl reload nginx
              
              if [ -n "$EMAIL" ]; then
                sudo certbot --nginx -d $DOMAIN -d www.$DOMAIN --non-interactive --agree-tos --email $EMAIL --redirect
              else
                sudo certbot --nginx -d $DOMAIN -d www.$DOMAIN --non-interactive --agree-tos --register-unsafely-without-email --redirect
              fi
            fi
          ENDSSH
      
      - name: Setup Nginx
        env:
          VPS_HOST: 92.118.114.147
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'ENDSSH'
            if [ -f /var/www/reusvertus/nginx.conf ]; then
              sudo cp /var/www/reusvertus/nginx.conf /etc/nginx/sites-available/ruesvertes.ru
            fi
            sudo ln -sf /etc/nginx/sites-available/ruesvertes.ru /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t
            sudo systemctl reload nginx || sudo service nginx reload
          ENDSSH
      
      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
